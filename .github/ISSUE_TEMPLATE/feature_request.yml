name: 💡 Feature request
description: Suggest an idea or improvement
labels: ["feature", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! It goes into the triage queue for review before any
        work starts — you'll see a label change when it's approved, declined or
        needs more detail.
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: The use case or frustration, not just the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution (optional)
      description: How you imagine it working.
  - type: input
    id: context
    attributes:
      label: Player / device / server (if relevant)
      placeholder: e.g. TiviMate on Fire Stick, or Jellyfin
