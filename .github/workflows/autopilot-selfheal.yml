# Autopilot · Pillar 1 — self-healing delivery (scaffold).
#
# Detect → diagnose → fix → gate. On a failed CI run or a new `bug` issue, an
# implementation agent can open a fix PR. The hard guardrails:
#   * CI (lint + tests + build) MUST pass before anything merges.
#   * Auto-merge ONLY the provably-safe class (lint, dep bumps, fixes whose new
#     test proves the fix). Risky changes wait for one-click human approval.
#   * Nothing runs autonomously until ANTHROPIC_API_KEY is configured — this
#     workflow is inert by default, so merely existing never writes code.
name: Autopilot — self-healing (scaffold)

on:
  workflow_run:
    workflows: ["build", "CI", "Docker publish"]
    types: [completed]
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  diagnose:
    # Fire on a failed CI run, or when a `bug` issue is opened/labelled.
    if: >-
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure')
      || (github.event_name == 'issues' && github.event.label.name == 'bug')
    runs-on: ubuntu-latest
    steps:
      - name: Guard — agent enabled?
        id: guard
        env:
          HAVE_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' }}
        run: echo "enabled=$HAVE_KEY" >> "$GITHUB_OUTPUT"

      # --- Implementation agent plugs in here (inert until enabled) ---------
      # Replace this with the build action; it must open a PR, never push to a
      # protected branch directly, and rely on required CI checks as the gate.
      - name: Diagnose & open fix PR (opt-in)
        if: steps.guard.outputs.enabled == 'true'
        run: |
          echo "Self-heal agent would diagnose the failure / bug and open a PR."
          echo "CI remains the merge gate; only the safe class auto-merges."
