services:
  tunaar:
    # Pre-built multi-arch image from GitHub Container Registry.
    image: ghcr.io/mchammer65/plexiptv:latest
    # To build from source instead, comment out `image` above and uncomment:
    # build: .
    container_name: tunaar
    restart: unless-stopped
    # Host networking keeps the advertised stream URLs correct on your LAN.
    # Works on QNAP / Linux hosts. (On Docker Desktop use a ports: mapping.)
    network_mode: host
    environment:
      # The only setting you must change — your IPTV playlist (URL or path).
      - TUNAAR_PLAYLIST=https://iptv-org.github.io/iptv/index.m3u
      # Optional XMLTV guide:
      # - TUNAAR_EPG_URL=https://example.com/epg.xml
      # Other overrides (all optional):
      # - TUNAAR_TUNER_COUNT=4
      # - TUNAAR_FRIENDLY_NAME=Tunaar
    volumes:
      # Persists the generated device id (and any saved config) across restarts.
      - tunaar-config:/config
      # Optional: enables the console's one-click "Update now" button by letting
      # Tunaar pull a new image and recreate itself. Grants Docker (root-level)
      # access — omit it if you'd rather update via SSH / ./tunaar.sh update.
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  tunaar-config:
